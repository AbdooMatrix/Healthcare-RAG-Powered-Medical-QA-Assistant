[pytest]
testpaths = tests
markers =
    integration: mark test as requiring real models/FAISS index (skipped in CI)
addopts = -m "not integration"
filterwarnings =
    # FAISS/SWIG: upstream issue with Python 3.12+ (SwigPyPacked, SwigPyObject, swigvarlink)
    ignore:builtin type [Ss]wig.*has no __module__:DeprecationWarning
