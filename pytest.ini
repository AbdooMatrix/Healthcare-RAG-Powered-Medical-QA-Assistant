[pytest]
testpaths = tests
markers =
    integration: mark test as requiring real models/FAISS index (skipped in CI)
    network: mark test as requiring internet access (skipped in CI without network)
    actionlint: mark test as requiring actionlint binary (skipped if .bin/actionlint not found)
addopts = -m "not integration and not network and not actionlint"
filterwarnings =
    # FAISS/SWIG: upstream issue with Python 3.12+ (SwigPyPacked, SwigPyObject, swigvarlink)
    ignore:builtin type [Ss]wig.*has no __module__:DeprecationWarning
