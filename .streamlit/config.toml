[server]
# ── Production Settings ────────────────────────────────────────
headless = true
runOnSave = false
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 1

[runner]
# Disable fast reruns to prevent unnecessary re-execution on every interaction
fastReruns = false
# Only re-run when explicitly requested
magicEnabled = false

[theme]
# Base theme config — overridden by custom CSS
base = "light"

[browser]
# Disable usage stats collection
gatherUsageStats = false
# Don't open browser (server mode)
serverAddress = "localhost"

[logger]
# Reduce logging verbosity
level = "warn"
