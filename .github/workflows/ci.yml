name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Lint (flake8)
        run: |
          flake8 src/ api/ config/ scripts/ mlops/ tests/ dashboard/ --max-line-length 120 \
            --exclude __pycache__,*.pyc

      - name: Unit tests — API & preprocessing
        run: |
          pytest tests/test_api.py tests/test_preprocessing.py -v --tb=short

      - name: Unit tests — Data modules & metrics
        run: |
          pytest tests/test_data_modules.py tests/test_metrics.py -v --tb=short

      - name: Unit tests — Pipeline orchestration
        run: |
          pytest tests/test_pipeline.py -v --tb=short

      - name: Unit tests — RAG modules (fully mocked)
        run: |
          pytest tests/test_rag_modules.py -v --tb=short

      - name: Coverage gate (unit tests only)
        run: |
          pytest tests/ \
            --ignore=tests/test_rag_pipeline.py \
            --cov=src --cov=api \
            --cov-report=term-missing \
            --cov-fail-under=100

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image (smoke test)
        run: |
          docker build -f docker/Dockerfile \
            -t healthcare-rag:ci-${{ github.sha }} .
