# .github/workflows/azure-deploy.yml
# CI/CD: push to main → run tests → build & push Docker images → deploy to Azure
#
# Deploys two Azure App Services:
#   1. healthcare-rag-app       — FastAPI backend
#   2. healthcare-rag-dashboard — Streamlit frontend
#
# Secrets required (set in GitHub repo Settings > Secrets):
#   GROQ_API_KEY      — Groq LLM API key
#   HF_TOKEN          — HuggingFace token
#   AZURE_ACR_NAME    — Container registry name (e.g. healthcareragacr)
#   AZURE_CREDENTIALS — Service principal JSON from:
#                       az ad sp create-for-rbac --name "github-rag-deploy"
#                         --role contributor
#                         --scopes /subscriptions/<sub-id>/resourceGroups/healthcare-rag-rg
#                         --sdk-auth

name: Azure Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  RESOURCE_GROUP: healthcare-rag-rg
  APP_NAME: healthcare-rag-app
  DASHBOARD_NAME: healthcare-rag-dashboard
  ACR_NAME: ${{ secrets.AZURE_ACR_NAME }}

jobs:
  # ── 1. Tests (same as ci.yml) ────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Lint
        run: |
          flake8 src/ api/ config/ scripts/ mlops/ tests/ dashboard/ \
            --max-line-length 120 \
            --exclude __pycache__,*.pyc

      - name: Unit tests
        run: |
          pytest tests/ \
            --ignore=tests/test_rag_pipeline.py \
            --tb=short -q

  # ── 2a. Build & Push API Docker image to ACR ────────────────────────────────
  build-and-push-api:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      acr-login-server: ${{ steps.acr-login.outputs.login-server }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        id: acr-login
        run: |
          SERVER=$(az acr show --name $ACR_NAME --query loginServer -o tsv)
          echo "login-server=$SERVER" >> $GITHUB_OUTPUT
          az acr login --name $ACR_NAME

      - name: Build and push API image
        run: |
          SERVER=${{ steps.acr-login.outputs.login-server }}
          IMAGE="${SERVER}/healthcare-rag:${{ github.sha }}"
          LATEST="${SERVER}/healthcare-rag:latest"

          docker build \
            -f docker/Dockerfile \
            -t $IMAGE \
            -t $LATEST \
            .

          docker push $IMAGE
          docker push $LATEST

  # ── 2b. Build & Push Dashboard Docker image to ACR ───────────────────────────
  build-and-push-dashboard:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: |
          az acr login --name $ACR_NAME

      - name: Build and push Dashboard image
        run: |
          SERVER=$(az acr show --name $ACR_NAME --query loginServer -o tsv)
          IMAGE="${SERVER}/healthcare-rag-dashboard:${{ github.sha }}"
          LATEST="${SERVER}/healthcare-rag-dashboard:latest"

          docker build \
            -f docker/Dockerfile.dashboard \
            -t $IMAGE \
            -t $LATEST \
            .

          docker push $IMAGE
          docker push $LATEST

  # ── 3a. Deploy API to Azure App Service ──────────────────────────────────────
  deploy-api:
    needs: build-and-push-api
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ env.APP_NAME }}.azurewebsites.net
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update App Service image
        run: |
          SERVER=${{ needs.build-and-push-api.outputs.acr-login-server }}
          az webapp config container set \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --docker-custom-image-name "${SERVER}/healthcare-rag:${{ github.sha }}"

      - name: Update environment variables
        run: |
          az webapp config appsettings set \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --settings \
              GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
              HF_TOKEN="${{ secrets.HF_TOKEN }}" \
              DEPLOY_DATE="$(date +%Y-%m-%d)" \
              DEPLOY_ENV="azure" \
              AZURE_APP_URL="https://${APP_NAME}.azurewebsites.net" \
              WEBSITES_PORT="8000"

      - name: Wait for deployment and smoke test
        # Startup timeline: uvicorn binds port immediately, then lifespan
        # downloads data (~1-2 min) and pre-loads models (~30s). The /health
        # endpoint returns 503 until lifespan completes, then returns 200.
        # 20 retries × 30s = 10 min gives ample time even on cold starts.
        run: |
          URL="https://${APP_NAME}.azurewebsites.net"
          for attempt in {1..20}; do
            STATUS=$(curl -so /dev/null -w "%{http_code}" "${URL}/health" || echo "000")
            echo "Health check attempt ${attempt}/20: HTTP ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              echo "✅ API deployment healthy: ${URL}"
              exit 0
            fi
            sleep 30
          done
          echo "❌ API deployment did not become healthy within 10 minutes."
          exit 1

  # ── 3b. Deploy Dashboard to Azure App Service ────────────────────────────────
  # Waits for the API to be healthy first so env vars are in sync on first start.
  deploy-dashboard:
    needs: [build-and-push-dashboard, deploy-api]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ env.DASHBOARD_NAME }}.azurewebsites.net
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Dashboard App Service (if not exists)
        run: |
          az webapp show \
            --name $DASHBOARD_NAME \
            --resource-group $RESOURCE_GROUP \
            --output table 2>/dev/null || \
          az webapp create \
            --resource-group $RESOURCE_GROUP \
            --plan healthcare-rag-plan \
            --name $DASHBOARD_NAME \
            --deployment-container-image-name nginx:alpine \
            --output table

      - name: Update Dashboard App Service image
        run: |
          SERVER=$(az acr show --name $ACR_NAME --query loginServer -o tsv)
          az webapp config container set \
            --name $DASHBOARD_NAME \
            --resource-group $RESOURCE_GROUP \
            --docker-custom-image-name "${SERVER}/healthcare-rag-dashboard:${{ github.sha }}"

      - name: Update Dashboard environment variables
        run: |
          az webapp config appsettings set \
            --name $DASHBOARD_NAME \
            --resource-group $RESOURCE_GROUP \
            --settings \
              DEPLOY_DATE="$(date +%Y-%m-%d)" \
              DEPLOY_ENV="azure" \
              AZURE_APP_URL="https://${APP_NAME}.azurewebsites.net" \
              DASHBOARD_URL="https://${DASHBOARD_NAME}.azurewebsites.net" \
              WEBSITES_PORT="8501"

      - name: Wait for dashboard deployment
        run: |
          URL="https://${DASHBOARD_NAME}.azurewebsites.net"
          for attempt in {1..12}; do
            STATUS=$(curl -so /dev/null -w "%{http_code}" "${URL}/_stcore/health" || echo "000")
            echo "Health check attempt ${attempt}/12: HTTP ${STATUS}"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
              echo "✅ Dashboard deployment healthy: ${URL}"
              exit 0
            fi
            sleep 30
          done
          echo "⚠️ Dashboard health check did not return 200; may still be starting."
          echo "   Check at: https://${DASHBOARD_NAME}.azurewebsites.net"

  # ── 4. Post-Deployment Health Check ──────────────────────────────────────────
  # Runs after both App Services are deployed. Pings endpoints, runs a
  # smoke-test query, and reports comprehensive status. This does NOT block
  # the deployment — the environment url is set in the deploy jobs above.
  post-deploy-health-check:
    needs: [deploy-api, deploy-dashboard]
    runs-on: ubuntu-latest
    if: always()  # run even if dashboard deploy had warnings
    steps:
      - name: Check API health endpoint
        id: api-health
        run: |
          URL="https://${APP_NAME}.azurewebsites.net"
          echo "── Checking API health ──"
          HTTP=$(curl -so /dev/null -w "%{http_code}" "${URL}/health" 2>&1) || HTTP="000"
          echo "API /health → HTTP ${HTTP}"
          echo "api-http=${HTTP}" >> $GITHUB_OUTPUT

      - name: Check Dashboard health endpoint
        id: dashboard-health
        run: |
          URL="https://${DASHBOARD_NAME}.azurewebsites.net"
          echo "── Checking Dashboard health ──"
          HTTP=$(curl -so /dev/null -w "%{http_code}" "${URL}/_stcore/health" 2>&1) || HTTP="000"
          echo "Dashboard /_stcore/health → HTTP ${HTTP}"
          echo "dashboard-http=${HTTP}" >> $GITHUB_OUTPUT

      - name: Smoke test — API query
        id: api-query
        run: |
          URL="https://${APP_NAME}.azurewebsites.net"
          echo "── Smoke-testing API query ──"
          RESPONSE=$(curl -s -X POST "${URL}/query" \
            -H "Content-Type: application/json" \
            -d '{"question": "Does aspirin reduce cardiovascular risk?"}' 2>&1) || RESPONSE="curl-failed"
          if [ "$RESPONSE" = "curl-failed" ]; then
            echo "Query: ❌ Connection failed"
            echo "query-status=connection-failed" >> $GITHUB_OUTPUT
          else
            HAS_ANSWER=$(echo "$RESPONSE" | python -c "import sys,json; d=json.load(sys.stdin); print('yes' if d.get('answer') else 'no')" 2>/dev/null || echo "parse-failed")
            HAS_CATEGORY=$(echo "$RESPONSE" | python -c "import sys,json; d=json.load(sys.stdin); print('yes' if d.get('category') else 'no')" 2>/dev/null || echo "parse-failed")
            HAS_SOURCES=$(echo "$RESPONSE" | python -c "import sys,json; d=json.load(sys.stdin); print('yes' if d.get('source_citations') else 'no')" 2>/dev/null || echo "parse-failed")
            echo "Query: answer=${HAS_ANSWER}, category=${HAS_CATEGORY}, sources=${HAS_SOURCES}"
            echo "query-status=ok" >> $GITHUB_OUTPUT
            echo "query-answer=${HAS_ANSWER}" >> $GITHUB_OUTPUT
            echo "query-category=${HAS_CATEGORY}" >> $GITHUB_OUTPUT
            echo "query-sources=${HAS_SOURCES}" >> $GITHUB_OUTPUT
          fi

      - name: Post-deployment summary
        run: |
          API="${{ steps.api-health.outputs.api-http }}"
          DASH="${{ steps.dashboard-health.outputs.dashboard-http }}"
          QRY="${{ steps.api-query.outputs.query-status }}"

          echo "═══════════════════════════════════════════════════════"
          echo "  🌐 Post-Deployment Health Check"
          echo "  ────────────────────────────────────────────"

          echo "  API /health:    HTTP ${API} $([ "$API" = "200" ] && echo '✅' || echo '❌')"
          echo "  Dashboard:      HTTP ${DASH} $([ "$DASH" = "200" ] || [ "$DASH" = "302" ] && echo '✅' || echo '❌')"

          if [ "$QRY" = "ok" ]; then
            echo "  API query:      ✅ (answer=${{ steps.api-query.outputs.query-answer }}, category=${{ steps.api-query.outputs.query-category }}, sources=${{ steps.api-query.outputs.query-sources }})"
          elif [ "$QRY" = "connection-failed" ]; then
            echo "  API query:      ❌ Connection failed"
          else
            echo "  API query:      ⚠️ Not run"
          fi

          echo "  ────────────────────────────────────────────"
          if [ "$API" = "200" ] && ( [ "$DASH" = "200" ] || [ "$DASH" = "302" ] ) && [ "$QRY" = "ok" ]; then
            echo "  ✅ All endpoints healthy!"
          else
            echo "  ⚠️ Some checks failed. Review the logs above."
            echo "  API:     https://${APP_NAME}.azurewebsites.net/health"
            echo "  Dash:    https://${DASHBOARD_NAME}.azurewebsites.net"
          fi
          echo "═══════════════════════════════════════════════════════"
