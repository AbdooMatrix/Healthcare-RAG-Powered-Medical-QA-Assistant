# .github/workflows/azure-deploy.yml
# CI/CD: push to main → run tests → build & push Docker images → deploy to Azure
#
# Deploys two Azure App Services:
#   1. healthcare-rag-app       — FastAPI backend
#   2. healthcare-rag-dashboard — standalone HTML SPA
#
# Secrets required (set in GitHub repo Settings > Secrets):
#   GROQ_API_KEY      — Groq LLM API key
#   HF_TOKEN          — HuggingFace token (used as a Docker BuildKit secret)
#   AZURE_ACR_NAME    — Container registry name (e.g. healthcareragacr)
#   AZURE_CREDENTIALS — Service principal JSON from:
#                       az ad sp create-for-rbac --name "github-rag-deploy"
#                         --role contributor
#                         --scopes /subscriptions/<sub-id>/resourceGroups/healthcare-rag-rg
#                         --sdk-auth
#
# ── FIXES APPLIED ─────────────────────────────────────────────────────────────
# Fix 1 (CRITICAL — build failure): pre_download_models.py crashed with a 404
#   RepositoryNotFoundError because AbdoMatrix/biobert-medical-classifier wasn't
#   on HuggingFace Hub. It's now uploaded. The script gracefully handles any
#   missing repos with fallback logic and treats only the embedding model and
#   reranker as required downloads.
#
# Fix 2 (security): HF_TOKEN was passed via --build-arg, which bakes the token
#   into the image layer cache and triggers a Docker security warning.
#   FIX: Use Docker BuildKit --secret mount. The token is injected securely and
#   is NEVER written to any image layer. The job sets DOCKER_BUILDKIT=1 and
#   passes --secret id=HF_TOKEN,env=HF_TOKEN (not --build-arg).
#
# Fix 3 (CRITICAL — 503): acr-login-server job output was silently masked to ""
#   because the value contained the AZURE_ACR_NAME secret.
#   FIX: Compute ACR login server inline in every job: SERVER="${ACR_NAME}.azurecr.io"
#
# Fix 4 (CRITICAL — 503): App Service had no credentials to pull from ACR.
#   FIX: Enable ACR admin user and pass --docker-registry-server-{url,user,password}.
#
# Fix 5 (CRITICAL — 503): App Service Plan assumed to exist; if missing,
#   az webapp create silently fails.
#   FIX: Explicit plan-existence guard in both deploy jobs.
# ──────────────────────────────────────────────────────────────────────────────

name: Azure Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  RESOURCE_GROUP: healthcare-rag-rg
  APP_NAME: healthcare-rag-app
  DASHBOARD_NAME: healthcare-rag-dashboard
  ACR_NAME: ${{ secrets.AZURE_ACR_NAME }}

jobs:
  # ── 1. Tests ─────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Lint
        run: |
          flake8 src/ api/ config/ mlops/ tests/ dashboard/ \
            --max-line-length 120 \
            --exclude __pycache__,*.pyc

      - name: Unit tests
        run: |
          pytest tests/ \
            --ignore=tests/test_rag_pipeline.py \
            --tb=short -q

  # ── 2a. Build & Push API Docker image to ACR ─────────────────────────────────
  build-and-push-api:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          allow-no-subscriptions: true  # runner Azure CLI 2.34.53+ requires this for service principals without subscription-level RBAC

      - name: Build and push API image
        # Fix 1+2: use BuildKit secret mount for HF_TOKEN (not --build-arg).
        # pre_download_models.py reads the secret and pre-downloads models.
        # If the classifier repo doesn't exist on Hub, it warns and continues —
        # the service uses local disk weights or the DistilBERT fallback at runtime.
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DOCKER_BUILDKIT: "1"
        run: |
          # Fix 3: compute server inline — never use a job output that contains
          # a secret value, as GitHub Actions silently masks it to "".
          SERVER="${ACR_NAME}.azurecr.io"
          az acr login --name "$ACR_NAME"

          IMAGE="${SERVER}/healthcare-rag:${{ github.sha }}"
          LATEST="${SERVER}/healthcare-rag:latest"

          docker build \
            -f docker/Dockerfile \
            --secret id=HF_TOKEN,env=HF_TOKEN \
            -t "$IMAGE" \
            -t "$LATEST" \
            .

          docker push "$IMAGE"
          docker push "$LATEST"

  # ── 2b. Build & Push Dashboard Docker image to ACR ───────────────────────────
  build-and-push-dashboard:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          allow-no-subscriptions: true

      - name: Build and push Dashboard image
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          # Fix 3: same inline server computation as the API job.
          SERVER="${ACR_NAME}.azurecr.io"
          az acr login --name "$ACR_NAME"

          IMAGE="${SERVER}/healthcare-rag-dashboard:${{ github.sha }}"
          LATEST="${SERVER}/healthcare-rag-dashboard:latest"

          docker build \
            -f docker/Dockerfile.dashboard \
            -t "$IMAGE" \
            -t "$LATEST" \
            .

          docker push "$IMAGE"
          docker push "$LATEST"

  # ── 3a. Deploy API to Azure App Service ──────────────────────────────────────
  deploy-api:
    needs: build-and-push-api
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ env.APP_NAME }}.azurewebsites.net
    steps:
      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          allow-no-subscriptions: true

      # Fix 5: Ensure the App Service Plan exists before creating the App Service.
      - name: Ensure App Service Plan exists
        run: |
          az appservice plan show \
            --name healthcare-rag-plan \
            --resource-group $RESOURCE_GROUP \
            --output table 2>/dev/null || \
          az appservice plan create \
            --name healthcare-rag-plan \
            --resource-group $RESOURCE_GROUP \
            --is-linux \
            --sku B2 \
            --output table

      - name: Create API App Service (if not exists)
        run: |
          az webapp show \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --output table 2>/dev/null || \
          az webapp create \
            --resource-group $RESOURCE_GROUP \
            --plan healthcare-rag-plan \
            --name $APP_NAME \
            --deployment-container-image-name nginx:alpine \
            --output table

      # Fix 4: Enable ACR admin and update App Service image
      - name: Enable ACR admin and update App Service image
        run: |
          SERVER="${ACR_NAME}.azurecr.io"

          # Enable admin user on ACR (idempotent — safe to run every deploy)
          az acr update --name "$ACR_NAME" --admin-enabled true

          # Retrieve admin password at runtime (never stored in source control)
          ACR_PASSWORD=$(az acr credential show \
            --name "$ACR_NAME" \
            --query "passwords[0].value" \
            --output tsv)

          # Fix 3+4: pass the full image name AND registry credentials.
          az webapp config container set \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --docker-custom-image-name "${SERVER}/healthcare-rag:${{ github.sha }}" \
            --docker-registry-server-url "https://${SERVER}" \
            --docker-registry-server-user "$ACR_NAME" \
            --docker-registry-server-password "$ACR_PASSWORD"

      - name: Update environment variables
        # B2 plan has 3.5 GB RAM — skip reranker (~500 MB) to reduce memory pressure.
        # Models load lazily (not on startup) — UVICORN_WORKERS=1 keeps memory low.
        run: |
          az webapp config appsettings set \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --settings \
              GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
              HF_TOKEN="${{ secrets.HF_TOKEN }}" \
              DEPLOY_DATE="$(date +%Y-%m-%d)" \
              DEPLOY_ENV="azure" \
              AZURE_APP_URL="https://${APP_NAME}.azurewebsites.net" \
              WEBSITES_PORT="8000" \
              WEBSITES_CONTAINER_START_TIME_LIMIT="1800" \
              USE_RERANKER="false" \
              UVICORN_WORKERS="1"

      - name: Restart and wait for image pull
        # The Docker image is ~4 GB (includes pre-downloaded ML models).
        # Pulling from ACR Basic tier over a B2 connection can take 5-8 minutes.
        # We wait 8 minutes before probing to give the pull enough time.
        run: |
          az webapp restart \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP
          echo "Waiting 8 minutes for image pull + container cold start..."
          sleep 480

      - name: Wait for deployment — /health probe
        # Uvicorn starts immediately (no model loading at startup — models
        # load lazily to avoid OOM on B2 plan with 3.5 GB RAM).
        # /health returns HTTP 200 right away.
        run: |
          URL="https://${APP_NAME}.azurewebsites.net"

          # Phase 1: wait until uvicorn is up (HTTP 200 on /health)
          echo "Phase 1: waiting for HTTP 200 on /health..."
          for attempt in $(seq 1 30); do
            STATUS=$(curl -so /dev/null -w "%{http_code}" "${URL}/health" || echo "000")
            echo "  /health attempt ${attempt}/30: HTTP ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              echo "  ✅ API is up."
              break
            fi
            if [ "$attempt" = "30" ]; then
              echo "  ❌ API did not respond within 15 minutes."
              exit 1
            fi
            sleep 30
          done

          # Phase 2: call /warmup to pre-load models (allow up to 5 min).
          # This is best-effort — if warmup fails (OOM), the first user query
          # will trigger lazy loading instead.
          echo "Phase 2: calling /warmup to pre-load models..."
          WARMUP_STATUS=$(curl -so /dev/null -w "%{http_code}" \
            --max-time 300 "${URL}/warmup" || echo "000")
          echo "  /warmup → HTTP ${WARMUP_STATUS}"
          if [ "$WARMUP_STATUS" = "200" ]; then
            echo "  ✅ Pipeline warmed up — API ready for traffic."
          else
            echo "  ⚠️  Warmup returned ${WARMUP_STATUS} — first query will trigger lazy load."
            echo "  This is normal on memory-constrained plans."
          fi

  # ── 3b. Deploy Dashboard to Azure App Service ────────────────────────────────
  deploy-dashboard:
    needs: [build-and-push-dashboard, deploy-api]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ env.DASHBOARD_NAME }}.azurewebsites.net
    steps:
      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          allow-no-subscriptions: true

      # Fix 5: same plan-existence guard as the API deploy job.
      - name: Ensure App Service Plan exists
        run: |
          az appservice plan show \
            --name healthcare-rag-plan \
            --resource-group $RESOURCE_GROUP \
            --output table 2>/dev/null || \
          az appservice plan create \
            --name healthcare-rag-plan \
            --resource-group $RESOURCE_GROUP \
            --is-linux \
            --sku B2 \
            --output table

      - name: Create Dashboard App Service (if not exists)
        run: |
          az webapp show \
            --name $DASHBOARD_NAME \
            --resource-group $RESOURCE_GROUP \
            --output table 2>/dev/null || \
          az webapp create \
            --resource-group $RESOURCE_GROUP \
            --plan healthcare-rag-plan \
            --name $DASHBOARD_NAME \
            --deployment-container-image-name nginx:alpine \
            --output table

      # Fix 3+4: same inline server + ACR credentials fix as API.
      - name: Enable ACR admin and update Dashboard App Service image
        run: |
          SERVER="${ACR_NAME}.azurecr.io"

          az acr update --name "$ACR_NAME" --admin-enabled true

          ACR_PASSWORD=$(az acr credential show \
            --name "$ACR_NAME" \
            --query "passwords[0].value" \
            --output tsv)

          az webapp config container set \
            --name $DASHBOARD_NAME \
            --resource-group $RESOURCE_GROUP \
            --docker-custom-image-name "${SERVER}/healthcare-rag-dashboard:${{ github.sha }}" \
            --docker-registry-server-url "https://${SERVER}" \
            --docker-registry-server-user "$ACR_NAME" \
            --docker-registry-server-password "$ACR_PASSWORD"

      - name: Update Dashboard environment variables
        run: |
          az webapp config appsettings set \
            --name $DASHBOARD_NAME \
            --resource-group $RESOURCE_GROUP \
            --settings \
              DEPLOY_DATE="$(date +%Y-%m-%d)" \
              DEPLOY_ENV="azure" \
              AZURE_APP_URL="https://${APP_NAME}.azurewebsites.net" \
              DASHBOARD_URL="https://${DASHBOARD_NAME}.azurewebsites.net" \
              WEBSITES_PORT="80" \
              WEBSITES_CONTAINER_START_TIME_LIMIT="180"

      - name: Restart and wait for image pull
        run: |
          az webapp restart \
            --name $DASHBOARD_NAME \
            --resource-group $RESOURCE_GROUP
          echo "Waiting 2 minutes for image pull + cold start..."
          sleep 120

      - name: Wait for dashboard deployment
        run: |
          URL="https://${DASHBOARD_NAME}.azurewebsites.net"
          for attempt in $(seq 1 12); do
            STATUS=$(curl -so /dev/null -w "%{http_code}" "${URL}/" || echo "000")
            echo "Health check attempt ${attempt}/12: HTTP ${STATUS}"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "304" ]; then
              echo "✅ Dashboard deployment healthy: ${URL}"
              exit 0
            fi
            sleep 30
          done
          echo "⚠️ Dashboard health check did not return 200; may still be starting."
          echo "   Check at: https://${DASHBOARD_NAME}.azurewebsites.net"

  # ── 4. Post-Deployment Health Check ──────────────────────────────────────────
  post-deploy-health-check:
    needs: [deploy-api, deploy-dashboard]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Check API health endpoint
        id: api-health
        run: |
          URL="https://${APP_NAME}.azurewebsites.net"
          echo "── Checking API health ──"
          HTTP=$(curl -so /dev/null -w "%{http_code}" "${URL}/health" 2>&1) || HTTP="000"
          echo "API /health → HTTP ${HTTP}"
          echo "api-http=${HTTP}" >> $GITHUB_OUTPUT

      - name: Check Dashboard health endpoint
        id: dashboard-health
        run: |
          URL="https://${DASHBOARD_NAME}.azurewebsites.net"
          echo "── Checking Dashboard health ──"
          HTTP=$(curl -so /dev/null -w "%{http_code}" "${URL}/" 2>&1) || HTTP="000"
          echo "Dashboard / → HTTP ${HTTP}"
          echo "dashboard-http=${HTTP}" >> $GITHUB_OUTPUT

      - name: Smoke test — API query
        id: api-query
        run: |
          URL="https://${APP_NAME}.azurewebsites.net"
          echo "── Smoke-testing API query ──"
          RESPONSE=$(curl -s --max-time 120 -X POST "${URL}/query" \
            -H "Content-Type: application/json" \
            -d '{"question": "Does aspirin reduce cardiovascular risk?"}' 2>&1) || RESPONSE="curl-failed"
          if [ "$RESPONSE" = "curl-failed" ]; then
            echo "Query: ❌ Connection failed"
            echo "query-status=connection-failed" >> $GITHUB_OUTPUT
          else
            HAS_ANSWER=$(echo "$RESPONSE" | python -c \
              "import sys,json; d=json.load(sys.stdin); print('yes' if d.get('answer') else 'no')" \
              2>/dev/null || echo "parse-failed")
            HAS_CATEGORY=$(echo "$RESPONSE" | python -c \
              "import sys,json; d=json.load(sys.stdin); print('yes' if d.get('category') else 'no')" \
              2>/dev/null || echo "parse-failed")
            HAS_SOURCES=$(echo "$RESPONSE" | python -c \
              "import sys,json; d=json.load(sys.stdin); print('yes' if d.get('source_citations') else 'no')" \
              2>/dev/null || echo "parse-failed")
            echo "Query: answer=${HAS_ANSWER}, category=${HAS_CATEGORY}, sources=${HAS_SOURCES}"
            echo "query-status=ok" >> $GITHUB_OUTPUT
            echo "query-answer=${HAS_ANSWER}" >> $GITHUB_OUTPUT
            echo "query-category=${HAS_CATEGORY}" >> $GITHUB_OUTPUT
            echo "query-sources=${HAS_SOURCES}" >> $GITHUB_OUTPUT
          fi

      - name: Post-deployment summary
        run: |
          API="${{ steps.api-health.outputs.api-http }}"
          DASH="${{ steps.dashboard-health.outputs.dashboard-http }}"
          QRY="${{ steps.api-query.outputs.query-status }}"

          echo "═══════════════════════════════════════════════════════"
          echo "  🌐 Post-Deployment Health Check"
          echo "  ────────────────────────────────────────────"

          echo "  API /health:    HTTP ${API} $([ "$API" = "200" ] && echo '✅' || echo '❌')"
          echo "  Dashboard:      HTTP ${DASH} $([ "$DASH" = "200" ] || [ "$DASH" = "304" ] && echo '✅' || echo '❌')"

          if [ "$QRY" = "ok" ]; then
            ANS=${{ steps.api-query.outputs.query-answer }}
            CAT=${{ steps.api-query.outputs.query-category }}
            SRC=${{ steps.api-query.outputs.query-sources }}
            echo "  API query:      ✅ (answer=${ANS}, category=${CAT}, sources=${SRC})"
          elif [ "$QRY" = "connection-failed" ]; then
            echo "  API query:      ❌ Connection failed"
          else
            echo "  API query:      ⚠️ Not run"
          fi

          echo "  ────────────────────────────────────────────"
          if [ "$API" = "200" ] && ( [ "$DASH" = "200" ] || [ "$DASH" = "304" ] ) && [ "$QRY" = "ok" ]; then
            echo "  ✅ All endpoints healthy!"
          else
            echo "  ⚠️ Some checks failed. Review the logs above."
            echo "  API:     https://${APP_NAME}.azurewebsites.net/health"
            echo "  Dash:    https://${DASHBOARD_NAME}.azurewebsites.net"
          fi
          echo "═══════════════════════════════════════════════════════"
