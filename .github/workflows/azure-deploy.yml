# .github/workflows/azure-deploy.yml
# CI/CD: push to main → run tests → build & push Docker images → deploy to Azure
#
# Deploys two Azure App Services:
#   1. healthcare-rag-app       — FastAPI backend
#   2. healthcare-rag-dashboard — Streamlit frontend
#
# Secrets required (set in GitHub repo Settings > Secrets):
#   GROQ_API_KEY      — Groq LLM API key
#   HF_TOKEN          — HuggingFace token
#   AZURE_ACR_NAME    — Container registry name (e.g. healthcareragacr)
#   AZURE_CREDENTIALS — Service principal JSON from:
#                       az ad sp create-for-rbac --name "github-rag-deploy"
#                         --role contributor
#                         --scopes /subscriptions/<sub-id>/resourceGroups/healthcare-rag-rg
#                         --sdk-auth
#
# ── FIX SUMMARY ───────────────────────────────────────────────────────────────
# Bug 1 (CRITICAL — root cause of 503): Job outputs that contain a secret value
#   are silently masked to "" by GitHub Actions. The acr-login-server output
#   contained the AZURE_ACR_NAME secret, so deploy-api and deploy-dashboard
#   received an empty SERVER variable → App Services were configured with an
#   invalid image name like "/healthcare-rag:sha" → image pull failed → 503.
#   FIX: Compute the ACR login server inline in every job that needs it:
#        SERVER="${ACR_NAME}.azurecr.io"   (no job outputs needed)
#
# Bug 2 (CRITICAL — 503): App Service had no credentials to pull from ACR.
#   The old `az webapp config container set` call did not pass registry auth,
#   so Azure could not authenticate against the private ACR registry.
#   FIX: Enable ACR admin user and pass --docker-registry-server-{url,user,password}
#        in every container-set call.
#
# Bug 3 (CRITICAL — 503): The App Service Plan "healthcare-rag-plan" is assumed
#   to already exist; if it does not the `az webapp create` silently fails and
#   the App Service ends up in a broken state.
#   FIX: Add an explicit "ensure App Service Plan exists" step in both deploy jobs.
#
# Bug 4 (WARNING — imminently breaking): GitHub-hosted runners will force all
#   actions to Node.js 24 starting June 2, 2026. The workflow uses
#   actions/checkout@v4, actions/setup-python@v5, actions/cache@v4, and
#   azure/login@v2, all of which run on Node.js 20.
#   FIX: Add FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true to the workflow env so
#        the existing action versions continue to work under Node.js 24.
# ──────────────────────────────────────────────────────────────────────────────

name: Azure Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  RESOURCE_GROUP: healthcare-rag-rg
  APP_NAME: healthcare-rag-app
  DASHBOARD_NAME: healthcare-rag-dashboard
  ACR_NAME: ${{ secrets.AZURE_ACR_NAME }}
  # FIX (Bug 4): Force Node.js 24 for all actions before the June 2 deadline.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Tests ─────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Lint
        run: |
          flake8 src/ api/ config/ scripts/ mlops/ tests/ dashboard/ \
            --max-line-length 120 \
            --exclude __pycache__,*.pyc

      - name: Unit tests
        run: |
          pytest tests/ \
            --ignore=tests/test_rag_pipeline.py \
            --tb=short -q

  # ── 2a. Build & Push API Docker image to ACR ─────────────────────────────────
  # NOTE: The outputs block has been removed. The acr-login-server output was
  # being silently masked to "" because its value contained the AZURE_ACR_NAME
  # secret. Every downstream job now computes the server inline instead.
  build-and-push-api:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push API image
        run: |
          # FIX (Bug 1): Compute server inline — never use a job output that
          # contains a secret value, as GitHub Actions masks it to "".
          SERVER="${ACR_NAME}.azurecr.io"
          az acr login --name "$ACR_NAME"

          IMAGE="${SERVER}/healthcare-rag:${{ github.sha }}"
          LATEST="${SERVER}/healthcare-rag:latest"

          docker build \
            -f docker/Dockerfile \
            --build-arg HF_TOKEN=${{ secrets.HF_TOKEN }} \
            -t "$IMAGE" \
            -t "$LATEST" \
            .

          docker push "$IMAGE"
          docker push "$LATEST"

  # ── 2b. Build & Push Dashboard Docker image to ACR ───────────────────────────
  build-and-push-dashboard:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push Dashboard image
        run: |
          # FIX (Bug 1): Same inline server computation as the API job.
          SERVER="${ACR_NAME}.azurecr.io"
          az acr login --name "$ACR_NAME"

          IMAGE="${SERVER}/healthcare-rag-dashboard:${{ github.sha }}"
          LATEST="${SERVER}/healthcare-rag-dashboard:latest"

          docker build \
            -f docker/Dockerfile.dashboard \
            -t "$IMAGE" \
            -t "$LATEST" \
            .

          docker push "$IMAGE"
          docker push "$LATEST"

  # ── 3a. Deploy API to Azure App Service ──────────────────────────────────────
  deploy-api:
    needs: build-and-push-api
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ env.APP_NAME }}.azurewebsites.net
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # FIX (Bug 3): Ensure the App Service Plan exists before creating the
      # App Service. If the plan is missing, `az webapp create` fails and the
      # App Service is left in a broken state with no container configured.
      - name: Ensure App Service Plan exists
        run: |
          az appservice plan show \
            --name healthcare-rag-plan \
            --resource-group $RESOURCE_GROUP \
            --output table 2>/dev/null || \
          az appservice plan create \
            --name healthcare-rag-plan \
            --resource-group $RESOURCE_GROUP \
            --is-linux \
            --sku B2 \
            --output table

      - name: Create API App Service (if not exists)
        run: |
          az webapp show \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --output table 2>/dev/null || \
          az webapp create \
            --resource-group $RESOURCE_GROUP \
            --plan healthcare-rag-plan \
            --name $APP_NAME \
            --deployment-container-image-name nginx:alpine \
            --output table

      # FIX (Bug 2): Enable the ACR admin user so the App Service can
      # authenticate when pulling the image. Admin credentials are fetched
      # at deploy time — they are never stored in source control.
      - name: Enable ACR admin and update App Service image
        run: |
          SERVER="${ACR_NAME}.azurecr.io"

          # Enable admin user on ACR (idempotent — safe to run every deploy)
          az acr update --name "$ACR_NAME" --admin-enabled true

          # Retrieve admin password at runtime
          ACR_PASSWORD=$(az acr credential show \
            --name "$ACR_NAME" \
            --query "passwords[0].value" \
            --output tsv)

          # FIX (Bug 1 + Bug 2): Pass the full image name AND registry credentials.
          # Without --docker-registry-server-{url,user,password}, Azure App Service
          # cannot authenticate against the private ACR and the container pull fails.
          az webapp config container set \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --docker-custom-image-name "${SERVER}/healthcare-rag:${{ github.sha }}" \
            --docker-registry-server-url "https://${SERVER}" \
            --docker-registry-server-user "$ACR_NAME" \
            --docker-registry-server-password "$ACR_PASSWORD"

      - name: Update environment variables
        run: |
          az webapp config appsettings set \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --settings \
              GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
              HF_TOKEN="${{ secrets.HF_TOKEN }}" \
              DEPLOY_DATE="$(date +%Y-%m-%d)" \
              DEPLOY_ENV="azure" \
              AZURE_APP_URL="https://${APP_NAME}.azurewebsites.net" \
              WEBSITES_PORT="8000" \
              WEBSITES_CONTAINER_START_TIME_LIMIT="1800"

      - name: Restart and wait for image pull
        # az webapp config container set updates the image tag but does NOT
        # restart the container. An explicit restart is required. The 3-minute
        # wait gives Azure time to pull the 4-6 GB image before probing.
        run: |
          az webapp restart \
            --name $APP_NAME \
            --resource-group $RESOURCE_GROUP
          echo "Waiting 3 minutes for image pull + cold start..."
          sleep 180

      - name: Wait for deployment and smoke test
        # Startup timeline: uvicorn binds port immediately, then lifespan
        # downloads data (~1-2 min) and pre-loads models (~30s). The /health
        # endpoint returns 200 as soon as uvicorn is ready (lifespan yields
        # immediately). 30 retries × 30s = 15 min gives ample time even on
        # cold starts pulling a 4-6 GB image.
        run: |
          URL="https://${APP_NAME}.azurewebsites.net"
          for attempt in {1..30}; do
            STATUS=$(curl -so /dev/null -w "%{http_code}" "${URL}/health" || echo "000")
            echo "Health check attempt ${attempt}/30: HTTP ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              echo "✅ API deployment healthy: ${URL}"
              exit 0
            fi
            sleep 30
          done
          echo "❌ API deployment did not become healthy within 15 minutes."
          exit 1

  # ── 3b. Deploy Dashboard to Azure App Service ────────────────────────────────
  deploy-dashboard:
    needs: [build-and-push-dashboard, deploy-api]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ env.DASHBOARD_NAME }}.azurewebsites.net
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # FIX (Bug 3): Same plan-existence guard as the API deploy job.
      - name: Ensure App Service Plan exists
        run: |
          az appservice plan show \
            --name healthcare-rag-plan \
            --resource-group $RESOURCE_GROUP \
            --output table 2>/dev/null || \
          az appservice plan create \
            --name healthcare-rag-plan \
            --resource-group $RESOURCE_GROUP \
            --is-linux \
            --sku B2 \
            --output table

      - name: Create Dashboard App Service (if not exists)
        run: |
          az webapp show \
            --name $DASHBOARD_NAME \
            --resource-group $RESOURCE_GROUP \
            --output table 2>/dev/null || \
          az webapp create \
            --resource-group $RESOURCE_GROUP \
            --plan healthcare-rag-plan \
            --name $DASHBOARD_NAME \
            --deployment-container-image-name nginx:alpine \
            --output table

      # FIX (Bug 1 + Bug 2): Same inline server + ACR credentials fix as API.
      - name: Enable ACR admin and update Dashboard App Service image
        run: |
          SERVER="${ACR_NAME}.azurecr.io"

          az acr update --name "$ACR_NAME" --admin-enabled true

          ACR_PASSWORD=$(az acr credential show \
            --name "$ACR_NAME" \
            --query "passwords[0].value" \
            --output tsv)

          az webapp config container set \
            --name $DASHBOARD_NAME \
            --resource-group $RESOURCE_GROUP \
            --docker-custom-image-name "${SERVER}/healthcare-rag-dashboard:${{ github.sha }}" \
            --docker-registry-server-url "https://${SERVER}" \
            --docker-registry-server-user "$ACR_NAME" \
            --docker-registry-server-password "$ACR_PASSWORD"

      - name: Update Dashboard environment variables
        run: |
          az webapp config appsettings set \
            --name $DASHBOARD_NAME \
            --resource-group $RESOURCE_GROUP \
            --settings \
              DEPLOY_DATE="$(date +%Y-%m-%d)" \
              DEPLOY_ENV="azure" \
              AZURE_APP_URL="https://${APP_NAME}.azurewebsites.net" \
              DASHBOARD_URL="https://${DASHBOARD_NAME}.azurewebsites.net" \
              WEBSITES_PORT="8501" \
              WEBSITES_CONTAINER_START_TIME_LIMIT="1800"

      - name: Restart and wait for image pull
        run: |
          az webapp restart \
            --name $DASHBOARD_NAME \
            --resource-group $RESOURCE_GROUP
          echo "Waiting 2 minutes for image pull + cold start..."
          sleep 120

      - name: Wait for dashboard deployment
        run: |
          URL="https://${DASHBOARD_NAME}.azurewebsites.net"
          for attempt in {1..12}; do
            STATUS=$(curl -so /dev/null -w "%{http_code}" "${URL}/_stcore/health" || echo "000")
            echo "Health check attempt ${attempt}/12: HTTP ${STATUS}"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
              echo "✅ Dashboard deployment healthy: ${URL}"
              exit 0
            fi
            sleep 30
          done
          echo "⚠️ Dashboard health check did not return 200; may still be starting."
          echo "   Check at: https://${DASHBOARD_NAME}.azurewebsites.net"

  # ── 4. Post-Deployment Health Check ──────────────────────────────────────────
  post-deploy-health-check:
    needs: [deploy-api, deploy-dashboard]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check API health endpoint
        id: api-health
        run: |
          URL="https://${APP_NAME}.azurewebsites.net"
          echo "── Checking API health ──"
          HTTP=$(curl -so /dev/null -w "%{http_code}" "${URL}/health" 2>&1) || HTTP="000"
          echo "API /health → HTTP ${HTTP}"
          echo "api-http=${HTTP}" >> $GITHUB_OUTPUT

      - name: Check Dashboard health endpoint
        id: dashboard-health
        run: |
          URL="https://${DASHBOARD_NAME}.azurewebsites.net"
          echo "── Checking Dashboard health ──"
          HTTP=$(curl -so /dev/null -w "%{http_code}" "${URL}/_stcore/health" 2>&1) || HTTP="000"
          echo "Dashboard /_stcore/health → HTTP ${HTTP}"
          echo "dashboard-http=${HTTP}" >> $GITHUB_OUTPUT

      - name: Smoke test — API query
        id: api-query
        run: |
          URL="https://${APP_NAME}.azurewebsites.net"
          echo "── Smoke-testing API query ──"
          RESPONSE=$(curl -s -X POST "${URL}/query" \
            -H "Content-Type: application/json" \
            -d '{"question": "Does aspirin reduce cardiovascular risk?"}' 2>&1) || RESPONSE="curl-failed"
          if [ "$RESPONSE" = "curl-failed" ]; then
            echo "Query: ❌ Connection failed"
            echo "query-status=connection-failed" >> $GITHUB_OUTPUT
          else
            HAS_ANSWER=$(echo "$RESPONSE" | python -c \
              "import sys,json; d=json.load(sys.stdin); print('yes' if d.get('answer') else 'no')" \
              2>/dev/null || echo "parse-failed")
            HAS_CATEGORY=$(echo "$RESPONSE" | python -c \
              "import sys,json; d=json.load(sys.stdin); print('yes' if d.get('category') else 'no')" \
              2>/dev/null || echo "parse-failed")
            HAS_SOURCES=$(echo "$RESPONSE" | python -c \
              "import sys,json; d=json.load(sys.stdin); print('yes' if d.get('source_citations') else 'no')" \
              2>/dev/null || echo "parse-failed")
            echo "Query: answer=${HAS_ANSWER}, category=${HAS_CATEGORY}, sources=${HAS_SOURCES}"
            echo "query-status=ok" >> $GITHUB_OUTPUT
            echo "query-answer=${HAS_ANSWER}" >> $GITHUB_OUTPUT
            echo "query-category=${HAS_CATEGORY}" >> $GITHUB_OUTPUT
            echo "query-sources=${HAS_SOURCES}" >> $GITHUB_OUTPUT
          fi

      - name: Post-deployment summary
        run: |
          API="${{ steps.api-health.outputs.api-http }}"
          DASH="${{ steps.dashboard-health.outputs.dashboard-http }}"
          QRY="${{ steps.api-query.outputs.query-status }}"

          echo "═══════════════════════════════════════════════════════"
          echo "  🌐 Post-Deployment Health Check"
          echo "  ────────────────────────────────────────────"

          echo "  API /health:    HTTP ${API} $([ "$API" = "200" ] && echo '✅' || echo '❌')"
          echo "  Dashboard:      HTTP ${DASH} $([ "$DASH" = "200" ] || [ "$DASH" = "302" ] && echo '✅' || echo '❌')"

          if [ "$QRY" = "ok" ]; then
            ANS=${{ steps.api-query.outputs.query-answer }}
            CAT=${{ steps.api-query.outputs.query-category }}
            SRC=${{ steps.api-query.outputs.query-sources }}
            echo "  API query:      ✅ (answer=${ANS}, category=${CAT}, sources=${SRC})"
          elif [ "$QRY" = "connection-failed" ]; then
            echo "  API query:      ❌ Connection failed"
          else
            echo "  API query:      ⚠️ Not run"
          fi

          echo "  ────────────────────────────────────────────"
          if [ "$API" = "200" ] && ( [ "$DASH" = "200" ] || [ "$DASH" = "302" ] ) && [ "$QRY" = "ok" ]; then
            echo "  ✅ All endpoints healthy!"
          else
            echo "  ⚠️ Some checks failed. Review the logs above."
            echo "  API:     https://${APP_NAME}.azurewebsites.net/health"
            echo "  Dash:    https://${DASHBOARD_NAME}.azurewebsites.net"
          fi
          echo "═══════════════════════════════════════════════════════"
