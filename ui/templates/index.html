<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthcare RAG Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .chat-container { max-width: 800px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .response-area { margin-top: 20px; padding: 20px; border-left: 5px solid #0d6efd; background-color: #e9ecef; display: none; }
        .context-area { margin-top: 15px; font-size: 0.9em; color: #6c757d; display: none; }
        .loader { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="chat-container">
            <h2 class="text-center mb-4">🏥 Healthcare Medical Assistant</h2>
            <p class="text-muted text-center">Powered by RAG and Verified Medical Data</p>

            <form id="queryForm">
                <div class="mb-3">
                    <label for="query" class="form-label">Enter your medical question:</label>
                    <textarea class="form-control" id="query" name="query" rows="3" placeholder="e.g., What are the symptoms of hypertension?" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="submitBtn">Ask Assistant</button>
            </form>

            <div class="text-center mt-3 loader" id="loader">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>

            <div id="results" class="mt-4">
                <div id="categoryBadge" class="mb-2"></div>
                <div id="response" class="response-area"></div>
                <div id="contexts" class="context-area">
                    <h5>Retrieved Contexts:</h5>
                    <ul id="contextList" class="list-group list-group-flush"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('queryForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const query = document.getElementById('query').value;
            const loader = document.getElementById('loader');
            const submitBtn = document.getElementById('submitBtn');
            const responseArea = document.getElementById('response');
            const contextArea = document.getElementById('contexts');
            const contextList = document.getElementById('contextList');
            const categoryBadge = document.getElementById('categoryBadge');

            // Reset UI
            loader.style.display = 'block';
            submitBtn.disabled = true;
            responseArea.style.display = 'none';
            contextArea.style.display = 'none';
            categoryBadge.innerHTML = '';
            contextList.innerHTML = '';

            try {
                const formData = new FormData();
                formData.append('query', query);

                const res = await fetch('/ask', {
                    method: 'POST',
                    body: formData
                });

                const data = await res.json();

                if (data.error) {
                    responseArea.innerText = "Error: " + data.error;
                    responseArea.style.display = 'block';
                    responseArea.style.borderLeftColor = '#dc3545';
                } else {
                    categoryBadge.innerHTML = `<span class="badge bg-info text-dark">Category: ${data.category}</span>`;
                    responseArea.innerText = data.response;
                    responseArea.style.display = 'block';
                    responseArea.style.borderLeftColor = '#0d6efd';

                    if (data.retrieved_contexts && data.retrieved_contexts.length > 0) {
                        data.retrieved_contexts.forEach(ctx => {
                            const li = document.createElement('li');
                            li.className = 'list-group-item bg-transparent';
                            li.innerHTML = `<strong>Source:</strong> ${ctx.source}<br>${ctx.context}`;
                            contextList.appendChild(li);
                        });
                        contextArea.style.display = 'block';
                    }
                }
            } catch (err) {
                responseArea.innerText = "An error occurred: " + err.message;
                responseArea.style.display = 'block';
                responseArea.style.borderLeftColor = '#dc3545';
            } finally {
                loader.style.display = 'none';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
