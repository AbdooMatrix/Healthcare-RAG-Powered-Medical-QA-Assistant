# docker-compose.yml — version field removed (deprecated in Compose v2+)

services:
  healthcare-rag:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: healthcare-rag-api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - rag-embeddings:/app/data/embeddings
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  mlflow:
    image: python:3.10-slim
    container_name: healthcare-rag-mlflow
    working_dir: /app
    command: >
      sh -c "pip install mlflow --quiet &&
             mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri /mlruns"
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlruns
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/2.0/mlflow/experiments/list')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: healthcare-rag-dashboard
    ports:
      - "8080:80"
    environment:
      - AZURE_APP_URL=http://healthcare-rag:8000
    depends_on:
      healthcare-rag:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  rag-embeddings:
    driver: local
  mlflow-data:
    driver: local
