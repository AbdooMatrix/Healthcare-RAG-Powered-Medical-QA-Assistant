version: "3.9"

services:
  healthcare-rag:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: healthcare-rag-api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    # Mount a named volume so the FAISS index is only downloaded once
    volumes:
      - rag-embeddings:/app/data/embeddings
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s  # allow time for cold-start + potential index download

volumes:
  rag-embeddings:
    driver: local
