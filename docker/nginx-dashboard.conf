server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # ── API Proxy ──────────────────────────────────────────
    # In production, proxy /query and /health to the API backend.
    # Set API_UPSTREAM env var to the backend URL (e.g., http://healthcare-rag:8000).
    # Falls back to localhost:8000 if not set.
    # __API_UPSTREAM__ placeholder is replaced at container startup by entrypoint-dashboard.sh
    set $api_upstream "__API_UPSTREAM__";

    location /query {
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeout for LLM inference
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    location /health {
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    # ── SPA: serve index.html for all other routes ─────────
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # ── Static assets cache ────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable" always;
    }
}
